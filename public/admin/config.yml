backend:
  name: git-gateway
  branch: main
  identity_url: "https://mufaddalkachwala.netlify.app/.netlify/identity"
  gateway_url: "https://mufaddalkachwala.netlify.app/.netlify/git"

site_url: "https://mufaddalkachwala.netlify.app"
display_url: "https://mufaddalkachwala.netlify.app"
logo_url: "https://mufaddalkachwala.netlify.app/favicon.svg"

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "home_page"
    label: "Home Page"
    icon: "home"
    files:
      - name: "home"
        label: "Edit Home Page"
        file: "src/content/home.json"
        format: "json"
        fields:
          - { label: "Profile Image URL", name: "profileImage", widget: "string", hint: "Paste an image URL. You can upload files from the Media tab and copy the uploaded path." }
          - { label: "Resume URL", name: "resumeUrl", widget: "string", hint: "Dropbox links should usually end with dl=1 for direct download." }
          - { label: "Contact Email", name: "contactEmail", widget: "string" }
          - { label: "Linktree URL", name: "linktreeUrl", widget: "string" }
          - { label: "Availability Badge Text", name: "availabilityText", widget: "string" }
          - { label: "Showreel YouTube Video ID", name: "showreelVideoId", widget: "string", hint: "Use the YouTube ID for the hero showreel thumbnail." }
          - { label: "Available For Chips", name: "availabilityFor", widget: "list", collapsed: true, field: { label: "Availability Item", name: "item", widget: "string" } }
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            summary: "{{fields.line1}}"
            fields:
              - { label: "Headline Line 1", name: "line1", widget: "string" }
              - { label: "Headline Line 2", name: "line2", widget: "string" }
              - { label: "Highlighted Headline Line", name: "highlight", widget: "string" }
              - { label: "Intro Paragraph", name: "body", widget: "text", hint: "This is the main employer-facing pitch below the headline." }
          - label: "Quick Metrics"
            name: "metrics"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.value}} - {{fields.label}}"
            fields:
              - { label: "Number / Value", name: "value", widget: "string", hint: "Example: 100M+, 50%, 300+" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Premium SaaS Spotlight"
            name: "saasSpotlight"
            widget: "object"
            summary: "{{fields.title}}"
            hint: "Use this for a high-end product / SaaS motion piece that should be featured near the top of the homepage."
            fields:
              - { label: "Small Label", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "YouTube Video ID", name: "videoId", widget: "string", hint: "From youtube.com/watch?v=_0aeCMkb_dk, paste only _0aeCMkb_dk." }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Role & Ownership", name: "role", widget: "text" }
              - { label: "Highlight Chips", name: "highlights", widget: "list", collapsed: true, field: { label: "Highlight", name: "highlight", widget: "string" } }
          - label: "Award Recognition"
            name: "awardsSection"
            widget: "object"
            summary: "{{fields.title}}"
            hint: "Showcase credible third-party recognition near the top of the homepage and work page."
            fields:
              - { label: "Small Label", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Section Description", name: "description", widget: "text" }
              - label: "Awards"
                name: "awards"
                widget: "list"
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - { label: "Award / Work Title", name: "title", widget: "string" }
                  - { label: "Award Year", name: "year", widget: "string" }
                  - { label: "Category", name: "category", widget: "string" }
                  - { label: "Brief", name: "brief", widget: "text" }
                  - { label: "Official Winner Page URL", name: "url", widget: "string" }
          - label: "Leadership & Production Ownership"
            name: "leadershipSection"
            widget: "object"
            summary: "{{fields.title}}"
            hint: "Use this section to position leadership, project management, production ownership, and team lead strengths."
            fields:
              - { label: "Small Label", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Section Description", name: "description", widget: "text" }
              - label: "Leadership Strengths"
                name: "strengths"
                widget: "list"
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - { label: "Strength Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - label: "Client Logo Marquee"
            name: "clientsSection"
            widget: "object"
            summary: "{{fields.title}}"
            hint: "This controls the animated client logo section on the home page."
            fields:
              - { label: "Small Label", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Section Description", name: "description", widget: "text" }
              - label: "Client Logos"
                name: "clients"
                widget: "list"
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.name}}"
                hint: "Upload a logo from Media or choose an existing file, then add the brand name."
                fields:
                  - { label: "Brand / Client Name", name: "name", widget: "string" }
                  - { label: "Logo Image", name: "logo", widget: "image", choose_url: true }
                  - { label: "Slightly Larger Logo", name: "largerLogo", widget: "boolean", required: false, default: false, hint: "Use only for wide logos that need a tiny visual boost in the marquee." }
          - label: "CGI Case Studies"
            name: "cgiSection"
            widget: "object"
            summary: "{{fields.title}}"
            hint: "Expandable CGI / 3D production case-study section on the home page."
            fields:
              - { label: "Small Label", name: "eyebrow", widget: "string" }
              - { label: "Section Title", name: "title", widget: "string" }
              - { label: "Section Description", name: "description", widget: "text" }
              - { label: "Employer Fit Pitch", name: "employerPitch", widget: "text", hint: "Use this to connect CGI work to the exact employer or industry you are targeting." }
              - { label: "Production Highlights", name: "productionHighlights", widget: "list", collapsed: true, field: { label: "Highlight", name: "highlight", widget: "string" } }
              - label: "CGI Cases"
                name: "cases"
                widget: "list"
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - { label: "Case Title", name: "title", widget: "string" }
                  - { label: "Client / Context", name: "client", widget: "string" }
                  - { label: "Type Label", name: "type", widget: "string" }
                  - { label: "Case Image", name: "image", widget: "image", choose_url: true, required: false }
                  - label: "Gallery Images"
                    name: "galleryImages"
                    widget: "list"
                    required: false
                    collapsed: true
                    fields:
                      - { label: "Image", name: "src", widget: "image", choose_url: true }
                      - { label: "Alt Text", name: "alt", widget: "string" }
                  - { label: "Source URL", name: "sourceUrl", widget: "string" }
                  - { label: "Summary", name: "summary", widget: "text" }
                  - { label: "Case Study Detail", name: "caseStudy", widget: "text" }
                  - { label: "Workflow Steps", name: "workflow", widget: "list", collapsed: true, field: { label: "Workflow Step", name: "step", widget: "string" } }
                  - { label: "Pipeline Detail", name: "pipeline", widget: "text" }
                  - { label: "Role", name: "role", widget: "text" }
                  - { label: "Tools", name: "tools", widget: "string" }
                  - { label: "Proof Points", name: "proofPoints", widget: "list", collapsed: true, field: { label: "Proof Point", name: "proofPoint", widget: "string" } }
          - label: "Selected Work Cards"
            name: "selectedWorks"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            hint: "These are the featured cards shown on the home page. Use only the YouTube video ID, not the full URL."
            fields:
              - { label: "YouTube Video ID", name: "videoId", widget: "string", hint: "From youtube.com/watch?v=QYtqpC3wWi0, paste only QYtqpC3wWi0." }
              - { label: "Card Title", name: "title", widget: "string" }
              - { label: "Short Result / Description", name: "result", widget: "text" }
              - { label: "Client / Project Type", name: "client", widget: "string" }
              - { label: "Your Role", name: "role", widget: "string" }
              - { label: "Tools Used", name: "tools", widget: "string" }
              - { label: "Tags", name: "tags", widget: "list", collapsed: true, field: { label: "Tag", name: "tag", widget: "string" } }
          - label: "Experience"
            name: "experiences"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.company}} - {{fields.title}}"
            fields:
              - { label: "Role / Title", name: "title", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Period", name: "period", widget: "string", hint: "Example: 2024 - Present" }
              - { label: "Accent Color", name: "color", widget: "color", default: "#3c6e71" }
              - { label: "Highlights", name: "highlights", widget: "list", collapsed: true, field: { label: "Highlight", name: "highlight", widget: "string" } }
          - { label: "Core Skills", name: "coreSkills", widget: "list", collapsed: true, field: { label: "Skill", name: "skill", widget: "string" } }
          - label: "Software Skills"
            name: "softwareSkills"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.name}} - {{fields.level}}%"
            fields:
              - { label: "Software Name", name: "name", widget: "string" }
              - { label: "Skill Level", name: "level", widget: "number", value_type: "int", min: 0, max: 100 }
          - { label: "AI & Creative Tools", name: "aiTools", widget: "list", collapsed: true, field: { label: "Tool", name: "tool", widget: "string" } }
          - label: "Education"
            name: "education"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.school}}"
            fields:
              - { label: "School", name: "school", widget: "string" }
              - { label: "Program", name: "program", widget: "string" }
              - { label: "Period", name: "period", widget: "string" }
              - { label: "Accent Color", name: "color", widget: "color", default: "#3c6e71" }
          - label: "Case Study CTA"
            name: "caseStudy"
            widget: "object"
            summary: "{{fields.title}}"
            fields:
              - { label: "Small Label", name: "label", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Contact Card"
            name: "contactCard"
            widget: "object"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  - name: "work_page"
    label: "Work Page + Videos"
    icon: "video"
    files:
      - name: "work"
        label: "Edit Work Page"
        file: "src/content/work.json"
        format: "json"
        fields:
          - { label: "AI E-Learning Page Intro", name: "elearningIntro", widget: "text" }
          - { label: "Broadcast / Promo Placeholder Copy", name: "promoIntro", widget: "text", hint: "This is a future-work placeholder until real broadcast/promo videos are uploaded." }
          - label: "Featured Case Studies"
            name: "caseStudies"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            hint: "Use placeholders only when the exact client-approved metric is not available yet."
            fields:
              - { label: "Small Label", name: "label", widget: "string" }
              - { label: "Case Study Title", name: "title", widget: "string" }
              - { label: "YouTube Video ID", name: "videoId", widget: "string" }
              - { label: "Problem", name: "problem", widget: "text" }
              - { label: "Your Role", name: "role", widget: "text" }
              - { label: "Process", name: "process", widget: "text" }
              - { label: "Result", name: "result", widget: "text" }
              - { label: "Tools", name: "tools", widget: "list", collapsed: true, field: { label: "Tool", name: "tool", widget: "string" } }
          - { label: "E-Learning Filter Categories", name: "elearningCategories", widget: "list", collapsed: true, hint: "Categories here should match the Category field used on e-learning videos.", field: { label: "Category", name: "category", widget: "string" } }
          - label: "E-Learning Videos"
            name: "elearningVideos"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            hint: "Current uploaded work should live here unless it is truly broadcast, promo, reel, or campaign work. To add a video: click Add, paste the YouTube ID, add a title, module, category, then Save and Publish."
            fields:
              - { label: "YouTube Video ID", name: "id", widget: "string", hint: "Paste only the ID. Example: for https://www.youtube.com/watch?v=QYtqpC3wWi0 paste QYtqpC3wWi0." }
              - { label: "Video Title", name: "title", widget: "string" }
              - { label: "Module / Project Code", name: "module", widget: "string", hint: "Example: JEDU-01294 or CLIENT-001." }
              - { label: "Category", name: "category", widget: "string", hint: "Example: E-Learning or Communication." }
              - { label: "Mark as Featured", name: "featured", widget: "boolean", required: false, default: false }
          - label: "Broadcast / Promo Videos"
            name: "promoVideos"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            hint: "Future section only. Leave empty until you upload true broadcast, promo, reel, or campaign work."
            fields:
              - { label: "YouTube Video ID", name: "id", widget: "string", hint: "Paste only the ID from the YouTube URL." }
              - { label: "Video Title", name: "title", widget: "string" }
              - { label: "Module / Project Code", name: "module", widget: "string" }
              - { label: "Tag", name: "tag", widget: "string", hint: "Example: Promo, Campaign, Broadcast, Reel." }
              - { label: "Mark as Featured", name: "featured", widget: "boolean", required: false, default: false }
          - label: "Production Workflow Steps"
            name: "workflowSteps"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.step}} - {{fields.title}}"
            fields:
              - { label: "Step Number", name: "step", widget: "string", hint: "Example: 01" }
              - { label: "Step Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Accent Color", name: "color", widget: "color", default: "#3c6e71" }
              - { label: "Optional Badge", name: "badge", widget: "string", required: false }
          - label: "E-Learning Stats"
            name: "elearningStats"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.value}} - {{fields.label}}"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Broadcast / Promo Stats"
            name: "promoStats"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.value}} - {{fields.label}}"
            hint: "Future section only. Leave empty until public broadcast/promo metrics are ready."
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Tools & Technologies"
            name: "toolGroups"
            widget: "list"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.label}}"
            fields:
              - { label: "Group Label", name: "label", widget: "string" }
              - { label: "Tools", name: "tools", widget: "list", collapsed: true, field: { label: "Tool", name: "tool", widget: "string" } }
