backend:
  name: git-gateway
  branch: main
  identity_url: "https://mufaddalkachwala.netlify.app/.netlify/identity"
  gateway_url: "https://mufaddalkachwala.netlify.app/.netlify/git"

site_url: "https://mufaddalkachwala.netlify.app"
display_url: "https://mufaddalkachwala.netlify.app"

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "site_content"
    label: "Website Content"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/home.json"
        format: "json"
        fields:
          - { label: "Profile Image URL", name: "profileImage", widget: "string" }
          - { label: "Resume URL", name: "resumeUrl", widget: "string" }
          - { label: "Contact Email", name: "contactEmail", widget: "string" }
          - { label: "Linktree URL", name: "linktreeUrl", widget: "string" }
          - { label: "Availability Text", name: "availabilityText", widget: "string" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Line 1", name: "line1", widget: "string" }
              - { label: "Line 2", name: "line2", widget: "string" }
              - { label: "Highlighted Line", name: "highlight", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Metrics"
            name: "metrics"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Selected Work"
            name: "selectedWorks"
            widget: "list"
            fields:
              - { label: "YouTube Video ID", name: "videoId", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Result", name: "result", widget: "text" }
              - { label: "Tags", name: "tags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }
          - label: "Experience"
            name: "experiences"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Period", name: "period", widget: "string" }
              - { label: "Accent Color", name: "color", widget: "color", default: "#3c6e71" }
              - { label: "Highlights", name: "highlights", widget: "list", field: { label: "Highlight", name: "highlight", widget: "string" } }
          - { label: "Core Skills", name: "coreSkills", widget: "list", field: { label: "Skill", name: "skill", widget: "string" } }
          - label: "Software Skills"
            name: "softwareSkills"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Level", name: "level", widget: "number", value_type: "int", min: 0, max: 100 }
          - { label: "AI Tools", name: "aiTools", widget: "list", field: { label: "Tool", name: "tool", widget: "string" } }
          - label: "Education"
            name: "education"
            widget: "list"
            fields:
              - { label: "School", name: "school", widget: "string" }
              - { label: "Program", name: "program", widget: "string" }
              - { label: "Period", name: "period", widget: "string" }
              - { label: "Accent Color", name: "color", widget: "color", default: "#3c6e71" }
          - label: "Case Study CTA"
            name: "caseStudy"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Contact Card"
            name: "contactCard"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
      - name: "work"
        label: "Work Page"
        file: "src/content/work.json"
        format: "json"
        fields:
          - { label: "E-Learning Intro", name: "elearningIntro", widget: "text" }
          - { label: "Promo Intro", name: "promoIntro", widget: "text" }
          - { label: "E-Learning Categories", name: "elearningCategories", widget: "list", field: { label: "Category", name: "category", widget: "string" } }
          - label: "E-Learning Videos"
            name: "elearningVideos"
            widget: "list"
            fields:
              - { label: "YouTube ID", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Module", name: "module", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Featured", name: "featured", widget: "boolean", required: false }
          - label: "Promo Videos"
            name: "promoVideos"
            widget: "list"
            fields:
              - { label: "YouTube ID", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Module", name: "module", widget: "string" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Featured", name: "featured", widget: "boolean", required: false }
          - label: "Workflow Steps"
            name: "workflowSteps"
            widget: "list"
            fields:
              - { label: "Step", name: "step", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Accent Color", name: "color", widget: "color", default: "#3c6e71" }
              - { label: "Badge", name: "badge", widget: "string", required: false }
          - label: "E-Learning Stats"
            name: "elearningStats"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Promo Stats"
            name: "promoStats"
            widget: "list"
            fields:
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Tool Groups"
            name: "toolGroups"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Tools", name: "tools", widget: "list", field: { label: "Tool", name: "tool", widget: "string" } }
